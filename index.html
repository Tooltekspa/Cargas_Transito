<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOLTEK® — Control de Cargas en Tránsito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOOLTEK® — Sistema de Control de Cargas en Tránsito
   Paleta oficial: #25638f / #0081b0 / #91cade / #ffffff
   ============================================================ */

:root{
  --azul-oscuro:#25638f;
  --azul-cyan:#0081b0;
  --azul-claro:#91cade;
  --blanco:#ffffff;
  --azul-oscuro-rgb:37,99,143;

  --tinta:#16222e;
  --tinta-suave:#4d6573;
  --gris-100:#f4f7f9;
  --gris-200:#e7edf1;
  --gris-300:#d3dde3;
  --linea:#dde6ea;

  --rojo:#c23b3b;
  --rojo-bg:#fbeaea;
  --ambar:#b8860b;
  --ambar-bg:#fbf3df;
  --verde:#2f7d52;
  --verde-bg:#e8f5ee;

  --radio:8px;
  --radio-sm:5px;
  --sombra:0 2px 10px rgba(var(--azul-oscuro-rgb),0.08);
  --sombra-lg:0 12px 32px rgba(22,34,46,0.16);

  --mono:'IBM Plex Mono', 'SF Mono', Consolas, monospace;
  --sans:'Inter', -apple-system, 'Segoe UI', sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--gris-100);
  color:var(--tinta);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:var(--azul-claro);}

a{color:var(--azul-cyan);text-decoration:none;}

/* ---------- Scrollbar ---------- */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--gris-300);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--tinta-suave);}
::-webkit-scrollbar-track{background:transparent;}

/* ================= LOGIN ================= */
.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 18% 20%, rgba(145,202,222,0.35), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(0,129,176,0.18), transparent 50%),
    linear-gradient(160deg, #0e3a54 0%, var(--azul-oscuro) 45%, var(--azul-cyan) 100%);
  padding:24px;
}
.login-card{
  background:var(--blanco);
  border-radius:14px;
  width:100%;
  max-width:400px;
  padding:40px 36px 32px;
  box-shadow:var(--sombra-lg);
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:5px;
  background:linear-gradient(90deg,var(--azul-oscuro),var(--azul-cyan),var(--azul-claro));
}
.login-logo{
  display:flex;
  justify-content:center;
  margin-bottom:22px;
}
.login-logo img{width:170px;height:auto;}
.login-title{
  text-align:center;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--tinta-suave);
  margin:0 0 28px;
}
.field{margin-bottom:16px;}
.field label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--tinta-suave);
  margin-bottom:6px;
  letter-spacing:0.02em;
}
.field input,.field select{
  width:100%;
  padding:10px 13px;
  border:1.5px solid var(--gris-300);
  border-radius:var(--radio-sm);
  background:var(--gris-100);
  color:var(--tinta);
  transition:border-color .15s, background .15s;
}
.field input:focus,.field select:focus{
  outline:none;
  border-color:var(--azul-cyan);
  background:var(--blanco);
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:10px 18px;
  border-radius:var(--radio-sm);
  border:none;
  font-weight:600;
  font-size:13.5px;
  transition:filter .15s, transform .1s;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--azul-oscuro);color:var(--blanco);}
.btn-primary:hover{filter:brightness(1.12);}
.btn-block{width:100%;padding:11px;font-size:14px;margin-top:6px;}
.btn-secondary{background:var(--gris-200);color:var(--tinta);}
.btn-secondary:hover{background:var(--gris-300);}
.btn-ghost{background:transparent;color:var(--azul-oscuro);border:1.5px solid var(--gris-300);}
.btn-ghost:hover{border-color:var(--azul-cyan);color:var(--azul-cyan);}
.btn-danger{background:var(--rojo);color:var(--blanco);}
.btn-danger:hover{filter:brightness(1.1);}
.btn-sm{padding:6px 12px;font-size:12.5px;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}

.login-error{
  background:var(--rojo-bg);
  color:var(--rojo);
  font-size:12.5px;
  padding:9px 12px;
  border-radius:var(--radio-sm);
  margin-bottom:14px;
  display:none;
  font-weight:600;
}
.login-hint{
  text-align:center;
  font-size:11.5px;
  color:var(--tinta-suave);
  margin-top:18px;
  line-height:1.6;
}
.login-hint b{color:var(--azul-cyan);}

/* ================= APP SHELL ================= */
.app{display:none;min-height:100vh;flex-direction:column;}
.app.active{display:flex;}

.topbar{
  background:var(--azul-oscuro);
  color:var(--blanco);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  height:60px;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{height:30px;width:auto;filter:brightness(0) invert(1);}
.topbar-divider{width:1px;height:26px;background:rgba(255,255,255,0.25);}
.topbar-title{font-size:14px;font-weight:600;letter-spacing:0.01em;}
.topbar-title small{display:block;font-size:10.5px;font-weight:500;color:var(--azul-claro);letter-spacing:0.04em;text-transform:uppercase;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.topbar-user{display:flex;align-items:center;gap:9px;font-size:13px;}
.user-badge{
  width:30px;height:30px;border-radius:50%;
  background:var(--azul-cyan);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12.5px;flex-shrink:0;
}
.role-tag{
  font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  background:rgba(255,255,255,0.15);
  padding:2px 8px;border-radius:20px;
}
.btn-logout{
  background:transparent;color:var(--blanco);border:1.5px solid rgba(255,255,255,0.35);
  padding:7px 14px;border-radius:var(--radio-sm);font-size:12.5px;font-weight:600;
}
.btn-logout:hover{background:rgba(255,255,255,0.12);}

.sync-indicator{
  font-size:11px;font-weight:600;white-space:nowrap;
  padding:5px 10px;border-radius:20px;
  background:rgba(255,255,255,0.08);
}
.sync-indicator.sync-pendiente{color:var(--azul-claro);}
.sync-indicator.sync-progreso{color:var(--azul-claro);}
.sync-indicator.sync-ok{color:#bfe9d4;}
.sync-indicator.sync-error{color:#f3c4c4;}

.tabs{
  background:var(--blanco);
  border-bottom:1px solid var(--linea);
  display:flex;
  padding:0 24px;
  gap:4px;
  flex-shrink:0;
  overflow-x:auto;
}
.tab-btn{
  background:none;border:none;
  padding:14px 16px 12px;
  font-size:13.5px;font-weight:600;
  color:var(--tinta-suave);
  border-bottom:3px solid transparent;
  white-space:nowrap;
  display:flex;align-items:center;gap:7px;
}
.tab-btn:hover{color:var(--azul-oscuro);}
.tab-btn.active{color:var(--azul-oscuro);border-bottom-color:var(--azul-cyan);}
.tab-btn .tab-dot{
  background:var(--rojo);color:#fff;font-size:10px;font-weight:700;
  border-radius:10px;min-width:18px;height:18px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;
}
.tab-group-label{
  display:flex;align-items:center;
  padding:0 10px 0 14px;
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--tinta-suave);
  position:relative;
  white-space:nowrap;
}
.tab-group-label::before{
  content:"";
  width:1px;height:18px;
  background:var(--linea);
  margin-right:10px;
}
.tab-group-label:first-child::before{display:none;}

.view{display:none;padding:22px 24px 48px;max-width:1800px;width:100%;margin:0 auto;flex:1;}
.view.active{display:block;}

/* ---------- Page header ---------- */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
.page-head h1{font-size:19px;margin:0 0 3px;color:var(--tinta);}
.page-head p{margin:0;font-size:13px;color:var(--tinta-suave);}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ---------- Alert banner ---------- */
.alert-banner{
  background:var(--rojo-bg);
  border:1.5px solid #efc6c6;
  border-radius:var(--radio);
  padding:14px 18px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:14px;
}
.alert-banner.ok{background:var(--verde-bg);border-color:#bfe2cd;}
.alert-icon{
  width:38px;height:38px;border-radius:50%;
  background:var(--rojo);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:18px;font-weight:700;
}
.alert-banner.ok .alert-icon{background:var(--verde);}
.alert-text strong{display:block;color:var(--rojo);font-size:14px;margin-bottom:2px;}
.alert-banner.ok .alert-text strong{color:var(--verde);}
.alert-text span{font-size:12.5px;color:var(--tinta-suave);}

/* ---------- KPI cards ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{
  background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);
  padding:16px 18px;box-shadow:var(--sombra);
}
.kpi-card .kpi-label{font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--tinta-suave);margin-bottom:8px;}
.kpi-card .kpi-value{font-size:24px;font-weight:700;color:var(--azul-oscuro);font-family:var(--mono);}
.kpi-card .kpi-value.danger{color:var(--rojo);}
.kpi-card .kpi-value.warn{color:var(--ambar);}
.kpi-card .kpi-sub{font-size:11.5px;color:var(--tinta-suave);margin-top:4px;}

/* ---------- Cards / panels ---------- */
.panel{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra);margin-bottom:18px;}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--linea);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.panel-head h3{margin:0;font-size:14.5px;color:var(--tinta);}
.panel-body{padding:18px;}

/* ---------- Filters bar ---------- */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px 18px;border-bottom:1px solid var(--linea);background:var(--gris-100);}
.filters-bar input,.filters-bar select{
  padding:7px 11px;border:1.5px solid var(--gris-300);border-radius:var(--radio-sm);
  background:var(--blanco);font-size:12.5px;
}
.filters-bar input[type=text]{min-width:200px;}
.filters-bar .filter-label{font-size:11px;font-weight:700;color:var(--tinta-suave);text-transform:uppercase;letter-spacing:.03em;}

/* ---------- Table ---------- */
.table-scroll-top{overflow-x:auto;overflow-y:hidden;height:16px;display:none;}
.table-scroll-top-inner{height:1px;}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:430px;}

/* ---------- Multiselect (filtro de status con checkboxes) ---------- */
.multiselect{position:relative;display:inline-block;}
.multiselect-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 11px;border:1.5px solid var(--gris-300);border-radius:var(--radio-sm);
  background:var(--blanco);font-size:12.5px;color:var(--tinta);cursor:pointer;
  min-width:170px;justify-content:space-between;
}
.multiselect-btn:hover{border-color:var(--azul-cyan);}
.multiselect-btn .ms-caret{font-size:10px;color:var(--tinta-suave);}
.multiselect-panel{
  display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:40;
  background:var(--blanco);border:1.5px solid var(--linea);border-radius:var(--radio-sm);
  box-shadow:var(--sombra-lg);min-width:220px;max-height:280px;overflow-y:auto;padding:6px;
}
.multiselect-panel.open{display:block;}
.multiselect-option{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;
  font-size:12.5px;color:var(--tinta);cursor:pointer;
}
.multiselect-option:hover{background:var(--gris-100);}
.multiselect-option input{margin:0;cursor:pointer;}
.multiselect-actions{display:flex;justify-content:flex-end;padding:6px 8px 2px;border-top:1px solid var(--linea);margin-top:4px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  background:var(--gris-100);
  color:var(--tinta-suave);
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;
  padding:10px 12px;text-align:left;
  border-bottom:1.5px solid var(--linea);
  white-space:nowrap;
  position:sticky;top:0;
}
tbody td{padding:10px 12px;border-bottom:1px solid var(--linea);white-space:nowrap;color:var(--tinta);}
tbody tr:hover{background:var(--gris-100);}
tbody tr:last-child td{border-bottom:none;}
td.num{font-family:var(--mono);text-align:right;}
td.wrap{white-space:normal;min-width:160px;}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;
  letter-spacing:0.01em;white-space:nowrap;
}
.badge-azul{background:#e3f0f7;color:var(--azul-oscuro);}
.badge-cyan{background:#dceff6;color:var(--azul-cyan);}
.badge-verde{background:var(--verde-bg);color:var(--verde);}
.badge-ambar{background:var(--ambar-bg);color:var(--ambar);}
.badge-rojo{background:var(--rojo-bg);color:var(--rojo);}
.badge-gris{background:var(--gris-200);color:var(--tinta-suave);}

.row-atrasado{background:var(--rojo-bg) !important;}
.row-atrasado:hover{background:#f7dcdc !important;}
.row-proximo{background:var(--ambar-bg) !important;}
.row-proximo:hover{background:#f5e9c9 !important;}
.fila-grupo td{background:var(--gris-100) !important;font-size:11.5px;padding:8px 12px;border-bottom:1.5px solid var(--linea);}
.fila-grupo:hover td{background:var(--gris-100) !important;}

.empty-state{padding:48px 24px;text-align:center;color:var(--tinta-suave);}
.empty-state .empty-icon{font-size:34px;margin-bottom:10px;}
.empty-state strong{display:block;color:var(--tinta);font-size:14px;margin-bottom:4px;}

/* ---------- Calendar ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--linea);}
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-nav button{
  width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gris-300);background:var(--blanco);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--azul-oscuro);font-weight:700;
}
.cal-nav button:hover{background:var(--gris-100);border-color:var(--azul-cyan);}
.cal-month-label{font-size:15.5px;font-weight:700;min-width:170px;text-align:center;text-transform:capitalize;}
.cal-legend{display:flex;gap:14px;font-size:11.5px;color:var(--tinta-suave);flex-wrap:wrap;}
.cal-legend span{display:inline-flex;align-items:center;gap:5px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dot-rojo{background:var(--rojo);}
.dot-ambar{background:var(--ambar);}
.dot-verde{background:var(--verde);}
.dot-azul{background:var(--azul-cyan);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow{
  text-align:center;font-size:10.5px;font-weight:700;color:var(--tinta-suave);
  text-transform:uppercase;letter-spacing:.04em;padding:8px 0;
  background:var(--gris-100);border-bottom:1px solid var(--linea);
}
.cal-cell{
  min-height:96px;border-right:1px solid var(--linea);border-bottom:1px solid var(--linea);
  padding:6px;position:relative;background:var(--blanco);
}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.cal-empty{background:var(--gris-100);}
.cal-cell.cal-today{background:#eef7fb;}
.cal-daynum{font-size:11px;font-weight:700;color:var(--tinta-suave);margin-bottom:4px;}
.cal-cell.cal-today .cal-daynum{color:var(--azul-cyan);}
.cal-events{display:flex;flex-direction:column;gap:3px;max-height:70px;overflow-y:auto;}
.cal-event{
  font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cal-event.ev-atrasado{background:var(--rojo);color:#fff;}
.cal-event.ev-proximo{background:var(--ambar);color:#fff;}
.cal-event.ev-vigente{background:var(--azul-cyan);color:#fff;}
.cal-event.ev-pagado{background:var(--gris-300);color:var(--tinta-suave);}
.cal-more{font-size:9.5px;color:var(--tinta-suave);font-weight:700;padding-left:6px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(22,34,46,0.55);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--blanco);border-radius:12px;max-width:560px;width:100%;
  max-height:88vh;overflow-y:auto;box-shadow:var(--sombra-lg);
}
.modal-lg{max-width:760px;}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--linea);position:sticky;top:0;background:var(--blanco);z-index:2;
}
.modal-head h3{margin:0;font-size:15.5px;}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:none;background:var(--gris-100);
  font-size:15px;color:var(--tinta-suave);display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:var(--gris-200);color:var(--tinta);}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--linea);display:flex;justify-content:flex-end;gap:10px;}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;}
.detail-grid .full{grid-column:1/-1;}
.detail-item dt{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--tinta-suave);margin:0 0 3px;}
.detail-item dd{margin:0;font-size:13.5px;color:var(--tinta);font-weight:500;}
.detail-item dd.mono{font-family:var(--mono);}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .full{grid-column:1/-1;}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--tinta);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:600;
  box-shadow:var(--sombra-lg);display:flex;align-items:center;gap:9px;animation:toast-in .25s ease;
  min-width:220px;
}
.toast.toast-ok{background:var(--verde);}
.toast.toast-err{background:var(--rojo);}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Users mgmt (Admin) ---------- */
.user-list{display:flex;flex-direction:column;gap:0;}
.user-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 4px;border-bottom:1px solid var(--linea);gap:14px;flex-wrap:wrap;
}
.user-row:last-child{border-bottom:none;}
.user-row-left{display:flex;align-items:center;gap:12px;}
.user-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--azul-cyan);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;
}
.user-meta strong{display:block;font-size:13.5px;}
.user-meta span{font-size:11.5px;color:var(--tinta-suave);}
.user-row-right{display:flex;align-items:center;gap:8px;}

/* ---------- Misc utility ---------- */
.muted{color:var(--tinta-suave);}
.mono{font-family:var(--mono);}
.text-right{text-align:right;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--tinta-suave);margin:0 0 10px;}

.help-text{font-size:11.5px;color:var(--tinta-suave);margin-top:5px;}
.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-row input{width:auto;}

@media (max-width:760px){
  .form-grid,.detail-grid{grid-template-columns:1fr;}
  .topbar-title small{display:none;}
  .view{padding:16px 12px 40px;}
  .cal-cell{min-height:64px;}
}

</style>

<script>
// ============================================================
// TOOLTEK® — Sistema de Control de Cargas en Tránsito
// app.js — Estado, autenticación y utilidades
// ============================================================

const STORAGE_KEYS = {
  USERS: 'tooltek_ctt_users',
  ORDERS: 'tooltek_ctt_orders',
  PROVEEDORES: 'tooltek_ctt_proveedores',
  SESSION: 'tooltek_ctt_session',
};

const ROLES = {
  ADMIN: 'Administrador',
  COMEX: 'Comex',
  TESORERIA: 'Tesoreria',
};

// ---------- Bootstrap de datos en localStorage ----------
function seedIfEmpty() {
  if (!localStorage.getItem(STORAGE_KEYS.USERS)) {
    const defaultUsers = [
      { email: 'admin@tooltek.cl', password: 'admin123', role: ROLES.ADMIN, nombre: 'Administrador' },
      { email: 'comex@tooltek.cl', password: 'comex123', role: ROLES.COMEX, nombre: 'Comercio Exterior' },
      { email: 'tesoreria@tooltek.cl', password: 'tesoreria123', role: ROLES.TESORERIA, nombre: 'Tesorería' },
    ];
    localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(defaultUsers));
  }
  if (!localStorage.getItem(STORAGE_KEYS.ORDERS)) {
    const withIds = ORDERS_SEED.map((o, i) => ({ ...o, id: 'ORD-' + String(i + 1).padStart(4, '0') }));
    localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(withIds));
  }
  if (!localStorage.getItem(STORAGE_KEYS.PROVEEDORES)) {
    localStorage.setItem(STORAGE_KEYS.PROVEEDORES, JSON.stringify(PROVEEDORES_SEED));
  }
}

function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]'); }
function setUsers(u) { localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(u)); programarSyncDrive(); }
function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]'); }
function setOrders(o) { localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(o)); programarSyncDrive(); }
function getProveedores() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.PROVEEDORES) || '[]'); }
function setProveedores(p) { localStorage.setItem(STORAGE_KEYS.PROVEEDORES, JSON.stringify(p)); programarSyncDrive(); }

// ============================================================
// SINCRONIZACIÓN CON GOOGLE DRIVE (respaldo en tiempo real)
// ============================================================

const DRIVE_SYNC_URL_KEY = 'tooltek_ctt_drive_url';
let syncDriveTimer = null;
let syncEnProgreso = false;

const DRIVE_SYNC_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbx0Nh8X_JegyiE1rnAlgE0iS5LOFAfBZRwy-sNlK3p0jZxdPxJAPdvnfecKqTFx-LEE/exec';

function getDriveSyncUrl() {
  return localStorage.getItem(DRIVE_SYNC_URL_KEY) || DRIVE_SYNC_URL_DEFAULT;
}
function setDriveSyncUrl(url) {
  localStorage.setItem(DRIVE_SYNC_URL_KEY, url.trim());
}

function programarSyncDrive() {
  if (!getDriveSyncUrl()) return; // sin URL configurada, no hay nada que sincronizar
  clearTimeout(syncDriveTimer);
  setSyncIndicator('pendiente');
  syncDriveTimer = setTimeout(ejecutarSyncDrive, 1500);
}

async function ejecutarSyncDrive() {
  const url = getDriveSyncUrl();
  if (!url || syncEnProgreso) return;
  syncEnProgreso = true;
  setSyncIndicator('sincronizando');
  try {
    const payload = {
      action: 'guardarTodo',
      data: {
        orders: getOrders(),
        proveedores: getProveedores(),
        users: getUsers(),
      },
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS en Apps Script
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Respuesta de error del servidor');
    setSyncIndicator('ok');
  } catch (err) {
    setSyncIndicator('error');
  } finally {
    syncEnProgreso = false;
  }
}

async function cargarDesdeDrive() {
  const url = getDriveSyncUrl();
  if (!url) return false;
  setSyncIndicator('sincronizando');
  try {
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    const data = json.data || {};
    if (Array.isArray(data.orders) && data.orders.length) {
      localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(data.orders));
    }
    if (Array.isArray(data.proveedores) && data.proveedores.length) {
      localStorage.setItem(STORAGE_KEYS.PROVEEDORES, JSON.stringify(data.proveedores));
    }
    if (Array.isArray(data.users) && data.users.length) {
      localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(data.users));
    }
    setSyncIndicator('ok');
    return true;
  } catch (err) {
    setSyncIndicator('error');
    return false;
  }
}

function setSyncIndicator(estado) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  const map = {
    pendiente: { text: '● Cambios sin guardar', cls: 'sync-pendiente' },
    sincronizando: { text: '↻ Sincronizando con Drive…', cls: 'sync-progreso' },
    ok: { text: '✓ Respaldado en Drive', cls: 'sync-ok' },
    error: { text: '⚠ Sin conexión a Drive', cls: 'sync-error' },
    inactivo: { text: '', cls: '' },
  };
  const conf = map[estado] || map.inactivo;
  el.textContent = conf.text;
  el.className = 'sync-indicator ' + conf.cls;
}

function getSession() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.SESSION) || 'null'); }
  catch (e) { return null; }
}
function setSession(s) { localStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(STORAGE_KEYS.SESSION); }

// ---------- Estado global en memoria ----------
const state = {
  session: null,
  orders: [],
  proveedores: [],
  users: [],
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  filters: {
    comexEstado: [], comexProveedor: '', comexSearch: '',
    tesEstado: '', tesProveedor: '', tesSearch: '',
    infProveedor: '', infDesde: '', infHasta: '',
  },
};

// ---------- Utilidades de formato ----------
function fmtMoney(val, moneda) {
  if (val === null || val === undefined || isNaN(val)) return '—';
  const symbols = { USD: 'US$', EUR: '€', GBP: '£', CLP: '$' };
  const sym = symbols[moneda] || '';
  return sym + Number(val).toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso || typeof iso !== 'string' || !iso.match(/^\d{4}-\d{2}-\d{2}/)) return iso || '—';
  const [y, m, d] = iso.split('-');
  return `${d}-${m}-${y}`;
}

function parseISO(iso) {
  if (!iso || typeof iso !== 'string' || !iso.match(/^\d{4}-\d{2}-\d{2}/)) return null;
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function daysBetween(a, b) {
  const MS = 24 * 60 * 60 * 1000;
  return Math.round((b - a) / MS);
}

function todayDate() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function uid(prefix) {
  return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ---------- Barra de scroll superior sincronizada para tablas anchas ----------
function initTopScrollbars() {
  document.querySelectorAll('.table-wrap').forEach((wrap) => {
    if (wrap.dataset.topScrollInit) return;
    wrap.dataset.topScrollInit = '1';

    const topBar = document.createElement('div');
    topBar.className = 'table-scroll-top';
    const inner = document.createElement('div');
    inner.className = 'table-scroll-top-inner';
    topBar.appendChild(inner);
    wrap.parentNode.insertBefore(topBar, wrap);

    let syncing = false;
    topBar.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      wrap.scrollLeft = topBar.scrollLeft;
      syncing = false;
    });
    wrap.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      topBar.scrollLeft = wrap.scrollLeft;
      syncing = false;
    });

    const sync = () => {
      const content = wrap.querySelector('table') || wrap.firstElementChild;
      const contentWidth = content ? content.scrollWidth : wrap.scrollWidth;
      inner.style.width = contentWidth + 'px';
      const needsScroll = contentWidth > wrap.clientWidth + 2;
      topBar.style.display = needsScroll ? 'block' : 'none';
    };
    wrap._syncTopScroll = sync;

    const mo = new MutationObserver(sync);
    mo.observe(wrap, { childList: true, subtree: true });
    window.addEventListener('resize', sync);
    sync();
  });
}

function refreshTopScrollbars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.table-wrap').forEach((wrap) => {
      if (wrap._syncTopScroll) wrap._syncTopScroll();
    });
  });
}

// ---------- Toast ----------
function toast(msg, type) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'ok' ? ' toast-ok' : type === 'err' ? ' toast-err' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3400);
}

// ---------- Auth ----------
function attemptLogin(email, password) {
  const users = getUsers();
  const user = users.find(u => u.email.toLowerCase() === email.toLowerCase().trim() && u.password === password);
  if (!user) return null;
  return user;
}

function doLogin(email, password) {
  const user = attemptLogin(email, password);
  const errEl = document.getElementById('loginError');
  if (!user) {
    errEl.textContent = 'Correo o contraseña incorrectos.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  setSession({ email: user.email, role: user.role, nombre: user.nombre });
  state.session = getSession();
  boot();
}

function doLogout() {
  clearSession();
  state.session = null;
  document.getElementById('appShell').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginForm').reset();
}

// ============================================================
// LÓGICA DE PAGOS — hitos, estados y alertas
// ============================================================

// Determina si una condición de pago tiene esquema de anticipo/saldo
function tieneAnticipo(condicion) {
  return /c\/OC/i.test(condicion || '');
}

function pctAnticipo(condicion) {
  const m = (condicion || '').match(/^(\d+)%/);
  return m ? Number(m[1]) : 100;
}

// Calcula los "hitos" (eventos de pago) de una orden a partir de sus campos reales.
// Devuelve array de { tipo: 'anticipo'|'saldo'|'unico', monto, fecha, pagado }
function calcularHitos(o) {
  const hitos = [];
  const condicion = o.vencimiento || 'No definido';

  if (tieneAnticipo(condicion)) {
    const pct = pctAnticipo(condicion);
    const montoAnticipo = o.monto ? Math.round(o.monto * pct / 100 * 100) / 100 : null;
    const montoSaldo = o.monto ? Math.round(o.monto * (100 - pct) / 100 * 100) / 100 : null;

    hitos.push({
      key: 'anticipo',
      tipo: 'anticipo',
      label: `Anticipo ${pct}%`,
      monto: montoAnticipo,
      fecha: esFechaValida(o.fechaAnticipo) ? o.fechaAnticipo : null,
      pagado: !!o.pagoAnticipo && o.pagoAnticipo > 0,
      montoPagado: o.pagoAnticipo || 0,
    });
    hitos.push({
      key: 'saldo',
      tipo: 'saldo',
      label: `Saldo ${100 - pct}%`,
      monto: montoSaldo,
      fecha: esFechaValida(o.fechaSaldo) ? o.fechaSaldo : (o.eta || null),
      pagado: !!o.pagoSaldo && o.pagoSaldo > 0 && (o.pendiente || 0) <= 0.5,
      montoPagado: o.pagoSaldo || 0,
    });
  } else {
    // Pago único — fecha objetivo según tipo de condición
    let fecha = null;
    if (/F\.Factura|F\.BL/i.test(condicion)) {
      // 30 días desde fecha de factura o BL (house ref no tiene fecha BL directa, se usa eta)
      const base = condicion.match(/F\.Factura/i) ? o.dateInv : o.eta;
      const dias = (condicion.match(/^(\d+)/) || [])[1];
      if (esFechaValida(base) && dias) {
        const d = parseISO(base);
        d.setDate(d.getDate() + Number(dias));
        fecha = d.toISOString().slice(0, 10);
      } else {
        fecha = o.eta || o.fechaSaldo || null;
      }
    } else if (/fecha BL/i.test(condicion)) {
      fecha = o.eta || o.fechaSaldo || null;
    } else if (/ant\.Embarque|antes Embarque/i.test(condicion)) {
      fecha = o.etd || o.fechaConfOC || o.fechaAnticipo || null;
    } else if (/con OC/i.test(condicion)) {
      fecha = o.fechaConfOC || o.fechaAnticipo || null;
    } else {
      // antes BL / Liberar BL / default
      fecha = o.eta || o.fechaSaldo || o.fechaAnticipo || null;
    }

    const pagado = (o.pgdo || '').toUpperCase() === 'SI' || (o.pendiente !== null && o.pendiente !== undefined && o.pendiente <= 0.5);

    hitos.push({
      key: 'unico',
      tipo: 'unico',
      label: 'Pago 100%',
      monto: o.monto,
      fecha: esFechaValida(fecha) ? fecha : null,
      pagado: pagado,
      montoPagado: (o.pagoAnticipo || 0) + (o.pagoSaldo || 0),
    });
  }

  // Aplicar overrides manuales de Tesorería (pagado manual / fecha postergada)
  const overrides = o.hitosOverride || {};
  hitos.forEach(h => {
    const ov = overrides[h.key];
    if (ov) {
      if (ov.pagadoManual) h.pagado = true;
      if (ov.fechaPostergada) {
        h.fechaOriginal = h.fecha;
        h.fecha = ov.fechaPostergada;
        h.postergado = true;
      }
      h.historial = ov.historial || [];
    }
  });

  return hitos.filter(h => h.monto !== null && h.monto !== undefined);
}

function esFechaValida(v) {
  return typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v);
}

// Estado de un hito respecto a hoy: 'pagado' | 'atrasado' | 'proximo' | 'vigente'
function estadoHito(hito) {
  if (hito.pagado) return 'pagado';
  if (!hito.fecha) return 'vigente';
  const hoy = todayDate();
  const f = parseISO(hito.fecha);
  if (!f) return 'vigente';
  const diff = daysBetween(hoy, f);
  if (diff < 0) return 'atrasado';
  if (diff <= 7) return 'proximo';
  return 'vigente';
}

// Genera lista plana de todos los hitos de pago pendientes (no pagados) de todas las órdenes
function listaHitosPendientes(orders) {
  const out = [];
  orders.forEach(o => {
    calcularHitos(o).forEach(h => {
      if (!h.pagado) {
        out.push({ ...h, orden: o, estado: estadoHito(h) });
      }
    });
  });
  return out;
}

function listaHitosAtrasados(orders) {
  return listaHitosPendientes(orders).filter(h => h.estado === 'atrasado');
}

// ============================================================
// GESTIÓN MANUAL DE HITOS — Tesorería
// marcarComoPagado / postergarFecha, con historial de comentarios
// ============================================================

function obtenerOverride(orden, key) {
  orden.hitosOverride = orden.hitosOverride || {};
  orden.hitosOverride[key] = orden.hitosOverride[key] || { historial: [] };
  return orden.hitosOverride[key];
}

function marcarHitoComoPagado(orderId, hitoKey, comentario) {
  const orden = state.orders.find(o => o.id === orderId);
  if (!orden) return;
  const ov = obtenerOverride(orden, hitoKey);
  ov.pagadoManual = true;
  ov.historial.push({
    accion: 'pagado',
    comentario: comentario || '',
    usuario: state.session.nombre || state.session.email,
    fecha: new Date().toISOString(),
  });
  setOrders(state.orders);
}

function postergarHitoFecha(orderId, hitoKey, nuevaFecha, comentario) {
  const orden = state.orders.find(o => o.id === orderId);
  if (!orden) return;
  const ov = obtenerOverride(orden, hitoKey);
  ov.fechaPostergada = nuevaFecha;
  ov.historial.push({
    accion: 'postergado',
    comentario: comentario || '',
    nuevaFecha,
    usuario: state.session.nombre || state.session.email,
    fecha: new Date().toISOString(),
  });
  setOrders(state.orders);
}

function mostrarFormGestion(tipo) {
  document.getElementById('formPagar').style.display = tipo === 'pagar' ? 'block' : 'none';
  document.getElementById('formPostergar').style.display = tipo === 'postergar' ? 'block' : 'none';
  document.getElementById('btnTabPagar').className = 'btn ' + (tipo === 'pagar' ? 'btn-primary' : 'btn-secondary');
  document.getElementById('btnTabPostergar').className = 'btn ' + (tipo === 'postergar' ? 'btn-primary' : 'btn-secondary');
}

function confirmarMarcarPagado(orderId, hitoKey) {
  const comentario = document.getElementById('gp_comentarioPagar').value.trim();
  marcarHitoComoPagado(orderId, hitoKey, comentario);
  cerrarModal();
  toast('Pago marcado como realizado', 'ok');
  refrescarVistaActual();
}

function confirmarPostergarFecha(orderId, hitoKey) {
  const nuevaFecha = document.getElementById('gp_nuevaFecha').value;
  const comentario = document.getElementById('gp_comentarioPostergar').value.trim();
  if (!nuevaFecha) { toast('Selecciona la nueva fecha', 'err'); return; }
  if (!comentario) { toast('El motivo de la postergación es obligatorio', 'err'); return; }
  postergarHitoFecha(orderId, hitoKey, nuevaFecha, comentario);
  cerrarModal();
  toast('Fecha de pago postergada', 'ok');
  refrescarVistaActual();
}

function refrescarVistaActual() {
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) renderViewById(activeTab.dataset.target);
}

async function boot() {
  seedIfEmpty();
  state.session = getSession();

  // Si hay un respaldo en Drive configurado, intenta traer la versión más
  // reciente antes de mostrar la app. Si falla (sin conexión), sigue con
  // lo que ya hay en localStorage — eso es lo que permite "rescatar" en
  // una emergencia si el navegador se vacía o se cambia de equipo.
  if (getDriveSyncUrl()) {
    await cargarDesdeDrive();
  }

  state.orders = getOrders();
  state.proveedores = getProveedores();
  state.users = getUsers();

  if (!state.session) {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appShell').classList.remove('active');
    return;
  }

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').classList.add('active');
  renderShellForRole();
  initTopScrollbars();
}

function renderShellForRole() {
  const s = state.session;
  document.getElementById('userBadge').textContent = (s.nombre || s.email).slice(0, 1).toUpperCase();
  document.getElementById('userName').textContent = s.nombre || s.email;

      { id: 'tab-comex-bd', label: 'Carga en Tránsito', icon: '📊', group: 'Comex' },
      { id: 'tab-comex-nueva', label: 'Nueva Orden', icon: '➕', group: 'Comex' },
      { id: 'tab-tes-calendario', label: 'Calendario de Pagos', icon: '📅', group: 'Tesorería' },
      { id: 'tab-tes-alertas', label: 'Alertas', icon: '⚠️', dot: true, group: 'Tesorería' },
      { id: 'tab-tes-listado', label: 'Listado de Pagos', icon: '📋', group: 'Tesorería' },
      { id: 'tab-tes-informe', label: 'Informe Proveedores', icon: '📈', group: 'Tesorería' },
      { id: 'tab-admin-proveedores', label: 'Proveedores', icon: '🏭' },
    ],
    [ROLES.COMEX]: [
      { id: 'tab-comex-bd', label: 'Carga en Tránsito', icon: '📊' },
      { id: 'tab-comex-nueva', label: 'Nueva Orden', icon: '➕' },
      { id: 'tab-comex-proveedores', label: 'Proveedores', icon: '🏭' },
    ],
    [ROLES.TESORERIA]: [
      { id: 'tab-tes-calendario', label: 'Calendario de Pagos', icon: '📅' },
      { id: 'tab-tes-alertas', label: 'Alertas', icon: '⚠️', dot: true },
      { id: 'tab-tes-listado', label: 'Listado de Pagos', icon: '📋' },
      { id: 'tab-tes-informe', label: 'Informe Proveedores', icon: '📈' },
      { id: 'tab-tes-proveedores', label: 'Proveedores', icon: '🏭' },
    ],
  };

  const tabs = tabsByRole[s.role] || [];
  let lastGroup = null;
  tabs.forEach((t, i) => {
    if (s.role === ROLES.ADMIN && t.group && t.group !== lastGroup) {
      const sep = document.createElement('div');
      sep.className = 'tab-group-label';
      sep.textContent = t.group;
      tabsWrap.appendChild(sep);
      lastGroup = t.group;
    } else if (s.role === ROLES.ADMIN && !t.group) {
      lastGroup = null;
    }
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.target = t.id;
    btn.innerHTML = `<span>${t.icon}</span><span>${t.label}</span>` + (t.dot ? `<span class="tab-dot" id="alertDot">0</span>` : '');

    tabsWrap.appendChild(btn);
  });

  // Ocultar todas las vistas, mostrar la primera del rol
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (tabs[0]) {
    document.getElementById(viewIdFor(tabs[0].id)).classList.add('active');
    renderViewById(tabs[0].id);
  }
}

function viewIdFor(tabId) {
  return tabId.replace('tab-', 'view-');
}

function switchTab(tabId, btnEl) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewIdFor(tabId)).classList.add('active');
  renderViewById(tabId);
}

function renderViewById(tabId) {
  const map = {
    'tab-admin-usuarios': renderAdminUsuarios,
    'tab-admin-proveedores': renderProveedoresView,
    'tab-comex-bd': renderComexBD,

    'tab-tes-alertas': renderAlertas,
    'tab-tes-listado': renderListadoPagos,

    'tab-tes-proveedores': renderProveedoresView,
  };

}

function updateAlertDot() {
  const dot = document.getElementById('alertDot');
  if (!dot) return;
  const n = listaHitosAtrasados(state.orders).length;
  dot.textContent = n;
  dot.style.display = n > 0 ? 'flex' : 'none';

// ============================================================

const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOW = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

function renderCalendario() {
  const view = document.getElementById('view-tes-calendario');
  const hitos = listaHitosPendientes(state.orders).concat(
    // incluir también pagados del mes para contexto visual tenue
    state.orders.flatMap(o => calcularHitos(o).filter(h => h.pagado).map(h => ({ ...h, orden: o, estado: 'pagado' })))
  );

  const y = state.calYear, m = state.calMonth;
  const firstDay = new Date(y, m, 1);
  const startOffset = (firstDay.getDay() + 6) % 7; // lunes=0
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  const eventsByDay = {};
  hitos.forEach(h => {
    if (!h.fecha) return;
    const f = parseISO(h.fecha);
    if (!f || f.getFullYear() !== y || f.getMonth() !== m) return;
    const day = f.getDate();
    eventsByDay[day] = eventsByDay[day] || [];
    eventsByDay[day].push(h);
  });

  const today = todayDate();
  let cells = '';
  for (let i = 0; i < startOffset; i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    const evs = (eventsByDay[d] || []).sort((a, b) => (a.estado === 'atrasado' ? -1 : 1));
    const evsHtml = evs.slice(0, 3).map(h => {
      const cls = h.estado === 'pagado' ? 'ev-pagado' : h.estado === 'atrasado' ? 'ev-atrasado' : h.estado === 'proximo' ? 'ev-proximo' : 'ev-vigente';
      const titulo = `${escapeHtml(h.orden.consignor)} — ${h.label} — ${fmtMoney(h.monto, h.orden.moneda)}`;
      return `<div class="cal-event ${cls}" title="${titulo}" onclick="abrirDetalleOrden('${h.orden.id}')">${escapeHtml(h.orden.consignor.split(' ')[0])} · ${fmtMoney(h.monto, h.orden.moneda)}</div>`;
    }).join('');
    const moreHtml = evs.length > 3 ? `<div class="cal-more">+${evs.length - 3} más</div>` : '';
    cells += `<div class="cal-cell ${isToday ? 'cal-today' : ''}">
      <div class="cal-daynum">${d}</div>
      <div class="cal-events">${evsHtml}${moreHtml}</div>
    </div>`;
  }

  view.innerHTML = `
    <div class="page-head">
      <div>
        <h1>Calendario de pagos</h1>
        <p>Hitos de anticipo y saldo según condición de pago de cada orden.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="exportarRespaldoExcel()">⬇ Respaldo Excel</button>
      </div>
    </div>
    ${alertBannerHtml()}
    <div class="panel">
      <div class="cal-head">
        <div class="cal-nav">
          <button onclick="calMoverMes(-1)">‹</button>
          <div class="cal-month-label">${MESES[m]} ${y}</div>
          <button onclick="calMoverMes(1)">›</button>
          <button class="btn btn-ghost btn-sm" style="margin-left:6px;border-radius:6px;width:auto;padding:6px 12px;" onclick="calIrHoy()">Hoy</button>
        </div>
        <div class="cal-legend">
          <span><i class="dot dot-rojo"></i> Atrasado</span>
          <span><i class="dot dot-ambar"></i> Próximo (7 días)</span>
          <span><i class="dot dot-azul"></i> Vigente</span>
          <span><i class="dot" style="background:var(--gris-300)"></i> Pagado</span>
        </div>
      </div>
      <div class="cal-grid">
        ${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function calMoverMes(delta) {
  state.calMonth += delta;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  renderCalendario();
}
function calIrHoy() {
  const t = new Date();
  state.calMonth = t.getMonth();
  state.calYear = t.getFullYear();
  renderCalendario();
}

function alertBannerHtml() {
  const atrasados = listaHitosAtrasados(state.orders);

  const totalUSD = atrasados.filter(h => h.orden.moneda === 'USD').reduce((s, h) => s + (h.monto - (h.montoPagado||0)), 0);
  return `<div class="alert-banner">

// Fecha de referencia de "Orden de Compra" para una orden.
function fechaOCOrden(o) {
  return o.fechaConfOC || o.dateInv || o.etd || null;
}

// Determina la fecha real de pago de un hito.
// Si el hito fue marcado "pagado" mediante el modal de Gestión de Pago,
// usamos la última fecha registrada en su historial (dato exacto).
// Si el monto de pago viene directo de la orden (importación/edición manual,
// sin paso por el modal), no hay fecha exacta de pago registrada: se usa la
// fecha comprometida del hito como referencia aproximada.
function obtenerInfoPagoHito(h) {
  const hist = (h.historial || []).filter(x => x.accion === 'pagado');
  if (hist.length) {
    return { fecha: hist[hist.length - 1].fecha.slice(0, 10), aprox: false };
  }
  if (h.pagado) {
    return { fecha: h.fecha || null, aprox: true };
  }
  return { fecha: null, aprox: false };
}

// Aplana todas las órdenes en filas: una fila por hito de pago (anticipo/saldo/único)
function construirFilasInforme() {
  return state.orders.flatMap(o => {
    const fechaOC = fechaOCOrden(o);
    return calcularHitos(o).map(h => {
      const info = obtenerInfoPagoHito(h);
      const dias = (info.fecha && fechaOC) ? daysBetween(parseISO(fechaOC), parseISO(info.fecha)) : null;
      return {
        proveedor: o.consignor,
        ocFactura: o.invoice || o.orderRef || '—',
        ordenId: o.id,
        fechaOC,
        hito: h.label,
        monto: h.monto,
        moneda: o.moneda,
        fechaComprometida: h.fecha,
        estado: estadoHito(h),
        fechaPago: info.fecha,
        pagoAprox: info.aprox,
        dias,
      };
    });
  });
}

function renderInformeTabla() {
  const f = state.filters;
  let filas = construirFilasInforme();
  if (f.infProveedor) filas = filas.filter(r => r.proveedor === f.infProveedor);
  if (f.infDesde) filas = filas.filter(r => r.fechaOC && r.fechaOC >= f.infDesde);
  if (f.infHasta) filas = filas.filter(r => r.fechaOC && r.fechaOC <= f.infHasta);

  filas.sort((a, b) => {
    const p = (a.proveedor || '').localeCompare(b.proveedor || '');
    if (p !== 0) return p;
    const fa = a.fechaOC ? parseISO(a.fechaOC) : new Date(9999, 0, 1);
    const fb = b.fechaOC ? parseISO(b.fechaOC) : new Date(9999, 0, 1);
    return fa - fb;
  });

  // ---- KPIs ----
  const conFechaPago = filas.filter(r => r.dias !== null);
  const promDias = conFechaPago.length ? Math.round(conFechaPago.reduce((s, r) => s + r.dias, 0) / conFechaPago.length) : null;
  const montoPorMoneda = {};
  filas.filter(r => r.estado === 'pagado').forEach(r => { montoPorMoneda[r.moneda] = (montoPorMoneda[r.moneda] || 0) + (r.monto || 0); });
  const ocsUnicas = new Set(filas.map(r => r.ordenId)).size;

  document.getElementById('infKpiRow').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">OC / Facturas</div><div class="kpi-value">${ocsUnicas}</div></div>
    <div class="kpi-card"><div class="kpi-label">Hitos de pago</div><div class="kpi-value">${filas.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Promedio días OC → Pago</div><div class="kpi-value">${promDias !== null ? promDias + ' d' : '—'}</div><div class="kpi-sub">Sobre ${conFechaPago.length} pago(s) con fecha registrada</div></div>
    ${Object.entries(montoPorMoneda).map(([mon, val]) => `<div class="kpi-card"><div class="kpi-label">Pagado en ${mon}</div><div class="kpi-value">${fmtMoney(val, mon)}</div></div>`).join('')}
  `;

  // ---- Tabla agrupada por proveedor ----
  const badgeForEstado = { atrasado: 'badge-rojo', proximo: 'badge-ambar', vigente: 'badge-cyan', pagado: 'badge-verde' };
  const labelForEstado = { atrasado: 'Atrasado', proximo: 'Próximo', vigente: 'Vigente', pagado: 'Pagado' };

  let rowsHtml = '';
  let lastProv = null;
  filas.forEach(r => {
    if (r.proveedor !== lastProv) {
      lastProv = r.proveedor;
      const totalProv = filas.filter(x => x.proveedor === r.proveedor).length;
      rowsHtml += `<tr class="fila-grupo"><td colspan="9"><strong>${escapeHtml(r.proveedor || 'Sin proveedor')}</strong> <span style="color:var(--tinta-suave);font-weight:400;">· ${totalProv} hito(s)</span></td></tr>`;
    }
    const fechaPagoHtml = r.fechaPago
      ? `${fmtDate(r.fechaPago)}${r.pagoAprox ? ` <span style="color:var(--tinta-suave);font-size:10px;" title="Sin registro exacto de pago; se usa la fecha comprometida como referencia">(aprox)</span>` : ''}`
      : '—';
    rowsHtml += `
    <tr class="${r.estado === 'atrasado' ? 'row-atrasado' : r.estado === 'proximo' ? 'row-proximo' : ''}">
      <td></td>
      <td class="mono">${escapeHtml(r.ocFactura)}</td>
      <td>${escapeHtml(r.hito)}</td>
      <td class="num">${fmtMoney(r.monto, r.moneda)}</td>
      <td class="mono">${fmtDate(r.fechaOC)}</td>
      <td class="mono">${fmtDate(r.fechaComprometida)}</td>
      <td><span class="badge ${badgeForEstado[r.estado]}">${labelForEstado[r.estado]}</span></td>
      <td class="mono">${fechaPagoHtml}</td>
      <td class="num">${r.dias !== null ? r.dias + ' d' : '—'}</td>
    </tr>`;
  });

  document.getElementById('infTable').innerHTML = `
    <table>
      <thead><tr><th></th><th>OC / Factura</th><th>Hito</th><th>Monto</th><th>Fecha OC</th><th>Fecha comprometida</th><th>Estado</th><th>Fecha de pago</th><th>Días OC→Pago</th></tr></thead>
      <tbody>${rowsHtml || `<tr><td colspan="9"><div class="empty-state">No hay resultados para este filtro.</div></td></tr>`}</tbody>
    </table>`;
}

function exportarInformeProveedoresExcel() {
  if (typeof XLSX === 'undefined') { toast('No se pudo cargar el motor de Excel', 'err'); return; }
  const filas = construirFilasInforme();
  const data = filas.map(r => ({
    'Proveedor': r.proveedor, 'OC / Factura': r.ocFactura, 'Hito': r.hito,
    'Monto': r.monto, 'Moneda': r.moneda, 'Fecha OC': r.fechaOC,
    'Fecha comprometida': r.fechaComprometida, 'Estado': r.estado,
    'Fecha de pago': r.fechaPago, 'Fecha aproximada (sin registro exacto)': r.pagoAprox ? 'Sí' : 'No',
    'Días OC a Pago': r.dias,
  }));
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, 'Informe Proveedores');
  const fecha = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `Informe_Proveedores_${fecha}.xlsx`);
  toast('Excel generado correctamente', 'ok');
}

              <label class="multiselect-option">

  renderComexTable();
}

function labelMultiselectEstado() {
  const sel = state.filters.comexEstado;
  if (!sel.length) return 'Todos los status';
  if (sel.length === 1) return sel[0];
  return `${sel.length} status seleccionados`;
}

function toggleComexEstado(status, checked) {
  const sel = state.filters.comexEstado;
  if (checked) {
    if (!sel.includes(status)) sel.push(status);
  } else {
    state.filters.comexEstado = sel.filter(s => s !== status);
  }
  document.getElementById('comexEstadoBtnLabel').textContent = labelMultiselectEstado();
  renderComexTable();
}

function limpiarComexEstado() {
  state.filters.comexEstado = [];
  document.querySelectorAll('#comexEstadoPanel input[type=checkbox]').forEach(cb => cb.checked = false);
  document.getElementById('comexEstadoBtnLabel').textContent = labelMultiselectEstado();
  renderComexTable();
}

function toggleMultiselect(panelId) {
  const panel = document.getElementById(panelId);
  const wasOpen = panel.classList.contains('open');
  document.querySelectorAll('.multiselect-panel.open').forEach(p => p.classList.remove('open'));
  if (!wasOpen) panel.classList.add('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.multiselect')) {
    document.querySelectorAll('.multiselect-panel.open').forEach(p => p.classList.remove('open'));
  }
});

function renderComexTable() {
  const f = state.filters;
  let rows = state.orders;
  if (f.comexProveedor) rows = rows.filter(o => o.consignor === f.comexProveedor);
  if (f.comexEstado.length) rows = rows.filter(o => f.comexEstado.includes(o.status));
  if (f.comexSearch) {
    const q = f.comexSearch.toLowerCase();
    rows = rows.filter(o => (o.consignor||'').toLowerCase().includes(q) || (o.invoice||'').toLowerCase().includes(q) || String(o.orderRef||'').toLowerCase().includes(q) || (o.house||'').toLowerCase().includes(q));
  }
  rows = rows.slice().sort((a, b) => (b.orderRef || 0) - (a.orderRef || 0));

  const statusBadge = {
    'recibido': 'badge-verde', 'transito': 'badge-cyan', 'por cargar': 'badge-ambar',
    'Coord.Embarque': 'badge-ambar', 'Embarque Reserv.': 'badge-azul', 'OC emitida': 'badge-gris', 'Producc.en Orig.': 'badge-gris'

      origenPrincipal: document.getElementById('f_origin').value || 'N/D'

function guardarEdicionOrden(orderId) {
  const o = state.orders.find(x => x.id === orderId);
  if (!o) return;

  const monto = Number(document.getElementById('e_monto').value);
  const pagoAnticipo = Number(document.getElementById('e_pagoAnticipo').value) || 0;
  const pagoSaldo = Number(document.getElementById('e_pagoSaldo').value) || 0;

  o.consignor = document.getElementById('e_consignor').value;
  o.orderRef = Number(document.getElementById('e_orderRef').value) || document.getElementById('e_orderRef').value;
  o.invoice = document.getElementById('e_invoice').value || null;
  o.trans = document.getElementById('e_trans').value;
  o.mode = document.getElementById('e_mode').value;
  o.origin = document.getElementById('e_origin').value || null;
  o.house = document.getElementById('e_house').value || null;
  o.fechaConfOC = document.getElementById('e_fechaConfOC').value || null;
  o.etd = document.getElementById('e_etd').value || null;
  o.eta = document.getElementById('e_eta').value || null;
  o.status = document.getElementById('e_status').value;
  o.statusDoc = document.getElementById('e_statusDoc').value;
  o.monto = monto;
  o.moneda = document.getElementById('e_moneda').value;
  o.vencimiento = document.getElementById('e_vencimiento').value;
  o.pagoAnticipo = pagoAnticipo;
  o.fechaAnticipo = document.getElementById('e_fechaAnticipo').value || (pagoAnticipo > 0 ? o.fechaAnticipo : 'sin anticipo');
  o.pagoSaldo = pagoSaldo;
  o.fechaSaldo = document.getElementById('e_fechaSaldo').value || null;
  o.pendiente = Math.max(0, monto - pagoAnticipo - pagoSaldo);
  o.pgdo = o.pendiente <= 0.5 ? 'SI' : (pagoAnticipo > 0 || pagoSaldo > 0 ? 'Parcial' : 'NO');

  setOrders(state.orders);
  cerrarModal();
  toast('Orden actualizada · ' + (o.invoice || o.orderRef), 'ok');

  // Refrescar la vista actual
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) renderViewById(activeTab.dataset.target);
}

    nombre,

function abrirDetalleOrden(orderId) {
  const o = state.orders.find(x => x.id === orderId);
  if (!o) return;
  const hitos = calcularHitos(o);
  const puedeGestionar = state.session.role === ROLES.TESORERIA || state.session.role === ROLES.ADMIN;

  const hitosHtml = hitos.map(h => {
    const est = estadoHito(h);
    const badge = { atrasado:'badge-rojo', proximo:'badge-ambar', vigente:'badge-cyan', pagado:'badge-verde' }[est];
    const label = { atrasado:'Atrasado', proximo:'Próximo', vigente:'Vigente', pagado:'Pagado' }[est];
    const fechaCell = h.postergado
      ? `<span class="mono" style="text-decoration:line-through;color:var(--tinta-suave);font-size:11px;">${fmtDate(h.fechaOriginal)}</span><br><span class="mono">${fmtDate(h.fecha)}</span>`
      : `<span class="mono">${fmtDate(h.fecha)}</span>`;
    return `<tr>
      <td>${escapeHtml(h.label)}</td>
      <td class="num">${fmtMoney(h.monto, o.moneda)}</td>
      <td>${fechaCell}</td>
      <td><span class="badge ${badge}">${label}</span></td>
      ${puedeGestionar ? `<td>${est !== 'pagado' ? `<button class="btn btn-ghost btn-sm" onclick="abrirModalGestionPago('${o.id}','${h.key}')">Gestionar</button>` : ''}</td>` : ''}
    </tr>`;
  }).join('');

  const modal = document.getElementById('modalOverlay');
  modal.querySelector('.modal').className = 'modal modal-lg';
  modal.querySelector('.modal').innerHTML = `
    <div class="modal-head"><h3>Orden ${escapeHtml(o.orderRef ?? '')} — ${escapeHtml(o.consignor)}</h3><button class="modal-close" onclick="cerrarModal()">✕</button></div>
    <div class="modal-body">
      <div class="detail-grid">
        <div class="detail-item"><dt>Invoice</dt><dd class="mono">${escapeHtml(o.invoice || '—')}</dd></div>
        <div class="detail-item"><dt>House / BL</dt><dd class="mono">${escapeHtml(o.house || '—')}</dd></div>
        <div class="detail-item"><dt>Transporte</dt><dd>${escapeHtml(o.trans)}/${escapeHtml(o.mode)} desde ${escapeHtml(o.origin||'—')}</dd></div>
        <div class="detail-item"><dt>Status</dt><dd>${escapeHtml(o.status||'—')}</dd></div>
        <div class="detail-item"><dt>ETD</dt><dd class="mono">${fmtDate(o.etd)}</dd></div>
        <div class="detail-item"><dt>ETA</dt><dd class="mono">${fmtDate(o.eta)}</dd></div>
        <div class="detail-item"><dt>Status Documentación</dt><dd>${escapeHtml(o.statusDoc||'—')}</dd></div>
        <div class="detail-item"><dt>Condición de pago</dt><dd>${escapeHtml(o.vencimiento||'—')}</dd></div>
        <div class="detail-item"><dt>Monto total</dt><dd class="mono">${fmtMoney(o.monto, o.moneda)}</dd></div>
        <div class="detail-item"><dt>Pendiente</dt><dd class="mono">${fmtMoney(o.pendiente, o.moneda)}</dd></div>
      </div>
      <p class="section-title" style="margin-top:22px;">Hitos de pago</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Hito</th><th>Monto</th><th>Fecha</th><th>Estado</th>${puedeGestionar?'<th></th>':''}</tr></thead>
        <tbody>${hitosHtml}</tbody>
      </table></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button></div>
  `;
  modal.classList.add('active');
}

// ============================================================
// VISTA ADMINISTRADOR — Usuarios
// ============================================================

function renderAdminUsuarios() {
  const view = document.getElementById('view-admin-usuarios');
  const roleBadge = { [ROLES.ADMIN]: 'badge-rojo', [ROLES.COMEX]: 'badge-azul', [ROLES.TESORERIA]: 'badge-verde' };

  const rows = state.users.map((u, idx) => `
    <div class="user-row">
      <div class="user-row-left">
        <div class="user-avatar">${u.nombre.slice(0,1).toUpperCase()}</div>
        <div class="user-meta"><strong>${escapeHtml(u.nombre)}</strong><span>${escapeHtml(u.email)}</span></div>
      </div>
      <div class="user-row-right">
        <span class="badge ${roleBadge[u.role]||'badge-gris'}">${escapeHtml(u.role)}</span>
        <button class="btn btn-ghost btn-sm" onclick="abrirModalUsuario(${idx})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${idx})" ${u.email===state.session.email?'disabled title="No puedes eliminar tu propio usuario"':''}>Eliminar</button>
      </div>
    </div>`).join('');

  view.innerHTML = `
    <div class="page-head">
      <div><h1>Usuarios del sistema</h1><p>Otorga acceso a Comex o Tesorería ingresando correo y contraseña.</p></div>
      <div class="page-actions"><button class="btn btn-primary" onclick="abrirModalUsuario()">+ Nuevo usuario</button></div>
    </div>
    <div class="panel"><div class="panel-body"><div class="user-list">${rows}</div></div></div>
  `;
}

function abrirModalUsuario(idx) {
  const editing = idx !== undefined;
  const u = editing ? state.users[idx] : { nombre:'', email:'', password:'', role: ROLES.COMEX };
  const modal = document.getElementById('modalOverlay');
  modal.querySelector('.modal').className = 'modal';
  modal.querySelector('.modal').innerHTML = `
    <div class="modal-head"><h3>${editing?'Editar':'Nuevo'} usuario</h3><button class="modal-close" onclick="cerrarModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre completo</label><input type="text" id="mu_nombre" value="${escapeHtml(u.nombre)}"></div>
      <div class="field"><label>Correo</label><input type="email" id="mu_email" value="${escapeHtml(u.email)}"></div>
      <div class="field"><label>Contraseña</label><input type="text" id="mu_password" value="${escapeHtml(u.password)}" placeholder="Contraseña de acceso"></div>
      <div class="field"><label>Rol</label>
        <select id="mu_role">
          <option value="${ROLES.ADMIN}" ${u.role===ROLES.ADMIN?'selected':''}>${ROLES.ADMIN}</option>
          <option value="${ROLES.COMEX}" ${u.role===ROLES.COMEX?'selected':''}>${ROLES.COMEX}</option>
          <option value="${ROLES.TESORERIA}" ${u.role===ROLES.TESORERIA?'selected':''}>${ROLES.TESORERIA}</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarUsuario(${editing?idx:'null'})">Guardar acceso</button>
    </div>
  `;
  modal.classList.add('active');
}

function guardarUsuario(idx) {
  const nombre = document.getElementById('mu_nombre').value.trim();
  const email = document.getElementById('mu_email').value.trim();
  const password = document.getElementById('mu_password').value;
  const role = document.getElementById('mu_role').value;
  if (!nombre || !email || !password) { toast('Completa todos los campos', 'err'); return; }

  const dup = state.users.findIndex((u,i) => u.email.toLowerCase() === email.toLowerCase() && i !== idx);
  if (dup !== -1) { toast('Ese correo ya está registrado', 'err'); return; }

  const data = { nombre, email, password, role };
  if (idx === null || idx === undefined) state.users.push(data);
  else state.users[idx] = data;
  setUsers(state.users);
  cerrarModal();
  toast('Usuario guardado · acceso otorgado a ' + email, 'ok');
  renderAdminUsuarios();
}

function eliminarUsuario(idx) {
  const u = state.users[idx];
  if (u.email === state.session.email) return;
  if (!confirm(`¿Eliminar el acceso de ${u.nombre} (${u.email})?`)) return;
  state.users.splice(idx, 1);
  setUsers(state.users);
  toast('Usuario eliminado', 'ok');
  renderAdminUsuarios();
}

// ============================================================
// RESPALDO EXCEL — exporta el estado actual a .xlsx
// El usuario sube manualmente el archivo a Google Drive.
// ============================================================

function exportarRespaldoExcel() {
  if (typeof XLSX === 'undefined') { toast('No se pudo cargar el motor de Excel', 'err'); return; }

  const wb = XLSX.utils.book_new();

  // Hoja 1: Órdenes (estructura similar al Excel original)
  const ordersData = state.orders.map(o => ({
    'Trans': o.trans, 'Mode': o.mode, 'Consignor Name': o.consignor, 'Invoice': o.invoice,
    'Date Inv.': o.dateInv, 'Order Ref': o.orderRef, 'Fecha Conf.OC': o.fechaConfOC, 'House': o.house,
    'Origin': o.origin, 'ETD': o.etd, 'Leadtime': o.leadtime, 'ETA': o.eta, 'Transit time': o.transitTime,
    'Weight': o.weight, 'Volume': o.volume, 'QTY': o.qty, 'UQ': o.uq, 'status': o.status, 'DIN': o.din,
    'Status Documentacion': o.statusDoc, 'Monto': o.monto, 'Moneda': o.moneda, 'Vencimiento': o.vencimiento,
    'Pgdo': o.pgdo, 'Pago Anticipo': o.pagoAnticipo, 'Fecha anticipo': o.fechaAnticipo,
    'Pago Saldo': o.pagoSaldo, 'Fecha saldo': o.fechaSaldo, 'Pendiente': o.pendiente,
  }));
  const ws1 = XLSX.utils.json_to_sheet(ordersData);
  XLSX.utils.book_append_sheet(wb, ws1, 'Cargas en Transito');

  // Hoja 2: Proveedores
  const provData = state.proveedores.map(p => ({
    'Proveedor': p.nombre, 'Condicion de Pago': p.condicionPago, 'Moneda': p.moneda, 'Origen Principal': p.origenPrincipal,
  }));
  const ws2 = XLSX.utils.json_to_sheet(provData);
  XLSX.utils.book_append_sheet(wb, ws2, 'Proveedores');

  // Hoja 3: Hitos de pago pendientes (uso Tesorería)
  const hitosData = state.orders.flatMap(o => calcularHitos(o).filter(h => !h.pagado).map(h => ({
    'Proveedor': o.consignor, 'Invoice/OC': o.invoice || o.orderRef, 'Hito': h.label,
    'Monto': h.monto, 'Moneda': o.moneda, 'Fecha vencimiento': h.fecha, 'Estado': estadoHito(h),
  })));
  const ws3 = XLSX.utils.json_to_sheet(hitosData);
  XLSX.utils.book_append_sheet(wb, ws3, 'Uso Tesoreria');

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Cargas_en_Transito_Respaldo_${fecha}.xlsx`);
  toast('Excel generado. Súbelo a Drive para respaldar.', 'ok');
}

// ============================================================
// MODAL — Configurar respaldo en Drive
// ============================================================

function abrirModalConfigDrive() {
  const urlActual = getDriveSyncUrl();
  const modal = document.getElementById('modalOverlay');
  modal.querySelector('.modal').className = 'modal';
  modal.querySelector('.modal').innerHTML = `
    <div class="modal-head"><h3>☁ Respaldo en Google Drive</h3><button class="modal-close" onclick="cerrarModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--tinta-suave);margin-top:0;">
        Cada cambio en la app (nueva orden, pago marcado, edición, etc.) se guarda automáticamente
        en una hoja de Google Sheets dentro de tu Drive. Si necesitas pegar o actualizar la URL del
        Apps Script, hazlo aquí.
      </p>
      <div class="field">
        <label>URL del Apps Script (termina en /exec)</label>
        <input type="text" id="dc_url" value="${escapeHtml(urlActual)}" placeholder="https://script.google.com/macros/s/AKfycb.../exec">
      </div>
      <div id="dc_estado" style="margin-top:10px;font-size:12.5px;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="probarConexionDrive()">Probar conexión</button>
      <button class="btn btn-primary" onclick="guardarConfigDrive()">Guardar y sincronizar ahora</button>
    </div>
  `;
  modal.classList.add('active');
}

function guardarConfigDrive() {
  const url = document.getElementById('dc_url').value.trim();
  if (!url) { toast('Ingresa la URL del Apps Script', 'err'); return; }
  setDriveSyncUrl(url);
  toast('URL guardada. Sincronizando…', 'ok');
  ejecutarSyncDrive().then(() => {
    toast('Respaldo en Drive actualizado', 'ok');
  });
  cerrarModal();
}

async function probarConexionDrive() {
  const url = document.getElementById('dc_url').value.trim();
  const estadoEl = document.getElementById('dc_estado');
  if (!url) { estadoEl.innerHTML = '<span style="color:var(--rojo);">Ingresa una URL primero.</span>'; return; }
  estadoEl.innerHTML = '<span style="color:var(--tinta-suave);">Probando conexión…</span>';
  try {
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (json.ok) {
      const n = (json.data && json.data.orders) ? json.data.orders.length : 0;
      estadoEl.innerHTML = `<span style="color:var(--verde);">✓ Conexión exitosa. El Sheet tiene ${n} órdenes registradas.</span>`;
    } else {
      estadoEl.innerHTML = `<span style="color:var(--rojo);">✕ El script respondió con error: ${escapeHtml(json.error || 'desconocido')}</span>`;
    }
  } catch (err) {
    estadoEl.innerHTML = `<span style="color:var(--rojo);">✕ No se pudo conectar. Revisa que la URL sea correcta y que el script esté implementado como "Cualquier usuario".</span>`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  seedIfEmpty();

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    doLogin(email, password);
  });

  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('driveConfigBtn').addEventListener('click', abrirModalConfigDrive);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') cerrarModal();
  });

  boot();
});
